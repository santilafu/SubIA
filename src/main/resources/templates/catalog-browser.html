<!DOCTYPE html>
<!--
  Buscador / directorio de aplicaciones — catálogo de servicios conocidos.
  Permite buscar, filtrar por categoría y añadir servicios como suscripciones.
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Catálogo</title></head>
<body>
<div layout:fragment="content"
     x-data="{ search: '', cat: '' }">

    <!-- ── Cabecera ──────────────────────────────────────────────────── -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-100 flex items-center gap-2">
                <i class="bi bi-grid-3x3-gap text-accent"></i>
                Catálogo de servicios
            </h1>
            <p class="text-sm text-slate-500 mt-0.5">
                <span th:text="${allItems.size()}"></span> servicios disponibles
            </p>
        </div>
        <a th:href="@{/subscriptions/new}"
           class="flex items-center gap-2 px-4 py-2 bg-accent hover:bg-accent-hover text-white text-sm font-medium rounded-lg transition-all duration-200 no-underline shadow-lg shadow-accent/20">
            <i class="bi bi-plus-lg"></i>Nueva manual
        </a>
    </div>

    <!-- ── Barra de búsqueda + chips de categoría ─────────────────────── -->
    <div class="glass-card rounded-xl p-4 mb-6">
        <div class="flex flex-col gap-4">

            <!-- Búsqueda -->
            <div class="relative w-full sm:w-96">
                <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none text-sm"></i>
                <input type="text"
                       x-model="search"
                       class="w-full pl-9 pr-4 py-2 bg-elevated border border-white/[0.08] rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-accent/60 focus:ring-1 focus:ring-accent/30 transition-all duration-200"
                       placeholder="Buscar servicio…"
                       autocomplete="off"/>
            </div>

            <!-- Chips de categoría -->
            <div class="flex flex-wrap gap-2">
                <button @click="cat = ''"
                        :class="cat === ''
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    Todos
                </button>
                <button @click="cat = 'ia'"
                        :class="cat === 'ia'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🤖 IA
                </button>
                <button @click="cat = 'streaming'"
                        :class="cat === 'streaming'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    📺 Streaming
                </button>
                <button @click="cat = 'musica'"
                        :class="cat === 'musica'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🎵 Música
                </button>
                <button @click="cat = 'software'"
                        :class="cat === 'software'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    💼 Software
                </button>
                <button @click="cat = 'cloud'"
                        :class="cat === 'cloud'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    ☁️ Cloud
                </button>
                <button @click="cat = 'gaming'"
                        :class="cat === 'gaming'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🎮 Gaming
                </button>
                <button @click="cat = 'seguridad'"
                        :class="cat === 'seguridad'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🔒 Seguridad
                </button>
                <button @click="cat = 'noticias'"
                        :class="cat === 'noticias'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    📰 Noticias
                </button>
                <button @click="cat = 'salud'"
                        :class="cat === 'salud'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🏃 Salud
                </button>
                <button @click="cat = 'desarrollo'"
                        :class="cat === 'desarrollo'
                            ? 'border-accent/60 bg-accent/15 text-indigo-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-accent/40 hover:text-accent/80'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    💻 Desarrollo
                </button>
                <button @click="cat = 'prueba'"
                        :class="cat === 'prueba'
                            ? 'border-orange-500/60 bg-orange-500/15 text-orange-300'
                            : 'border-white/[0.1] text-slate-400 hover:border-orange-500/40 hover:text-orange-300'"
                        class="px-3 py-1 rounded-full text-xs font-medium border transition-all duration-200 cursor-pointer">
                    🆓 Pruebas gratuitas
                </button>
            </div>
        </div>
    </div>

    <!-- ── Grid de cards ──────────────────────────────────────────────── -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">

        <div th:each="item : ${allItems}"
             th:attr="data-name=${#strings.toLowerCase(item.name)},data-cat=${item.categoryKey}"
             x-show="(search === '' || $el.dataset.name.includes(search.toLowerCase())) && (cat === '' || $el.dataset.cat === cat)"
             x-cloak
             class="glass-card rounded-xl overflow-hidden flex flex-col transition-all duration-200 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-black/30">

            <div class="flex flex-col flex-1 p-5">

                <!-- Header: logo + nombre + badge prueba -->
                <div class="flex items-start gap-3 mb-3">

                    <!-- Logo -->
                    <div class="w-10 h-10 rounded-xl flex-shrink-0 bg-elevated flex items-center justify-center overflow-hidden border border-white/[0.06]">
                        <img th:if="${item.domain != null}"
                             th:src="'https://icon.horse/icon/' + ${item.domain}"
                             class="w-8 h-8 object-contain"
                             th:alt="${item.name}"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <span th:text="${item.name.substring(0,1).toUpperCase()}"
                              th:style="${item.domain != null} ? 'display:none' : 'display:flex'"
                              class="w-full h-full items-center justify-center text-sm font-bold text-accent"></span>
                    </div>

                    <!-- Nombre y descripción -->
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h3 class="font-semibold text-slate-100 text-sm leading-tight"
                                th:text="${item.name}"></h3>
                            <!-- Badge prueba -->
                            <span th:if="${item.trialDays != null}"
                                  th:text="'Prueba ' + ${item.trialDays} + 'd'"
                                  class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-orange-500/30 bg-orange-500/10 text-orange-300 flex-shrink-0">
                            </span>
                        </div>
                        <p class="text-xs text-slate-500 mt-0.5 line-clamp-2"
                           th:text="${item.description}"></p>
                    </div>
                </div>

                <!-- Precio -->
                <div class="flex items-baseline gap-1 mb-4">
                    <span class="text-xl font-bold text-slate-100"
                          th:text="'€' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                    <span class="text-xs text-slate-500"
                          th:text="${item.billingCycle.name() == 'MONTHLY' ? '/mes' : (item.billingCycle.name() == 'YEARLY' ? '/año' : '/sem.')}"></span>
                </div>

                <!-- Spacer para empujar footer abajo -->
                <div class="flex-1"></div>

                <!-- Footer: acciones -->
                <div class="flex items-center justify-end gap-2 pt-3 border-t border-white/[0.05]">

                    <!-- Enlace cancelación -->
                    <a th:if="${item.cancelUrl != null}"
                       th:href="${item.cancelUrl}"
                       target="_blank" rel="noopener noreferrer"
                       class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-orange-400/80 hover:text-orange-300 hover:bg-orange-500/10 border border-orange-500/20 hover:border-orange-500/40 transition-all duration-200 no-underline">
                        <i class="bi bi-x-circle"></i>Cancelar
                    </a>

                    <!-- Botón Añadir — deshabilitado si categoryId no está mapeado -->
                    <th:block th:if="${categoryKeyToId[item.categoryKey] != null}">
                        <form th:action="@{/subscriptions/add-from-catalog}" method="post" class="inline">
                            <input type="hidden" name="name"         th:value="${item.name}">
                            <input type="hidden" name="description"  th:value="${item.description}">
                            <input type="hidden" name="price"        th:value="${item.price}">
                            <input type="hidden" name="currency"     th:value="${item.currency}">
                            <input type="hidden" name="billingCycle" th:value="${item.billingCycle}">
                            <input type="hidden" name="categoryId"   th:value="${categoryKeyToId[item.categoryKey]}">
                            <input type="hidden" name="isTrial"      th:value="${item.trialDays != null}">
                            <input th:if="${item.trialDays != null}"
                                   type="hidden" name="trialEndsAt"
                                   th:value="${T(java.time.LocalDate).now().plusDays(item.trialDays)}">
                            <button type="submit"
                                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-accent hover:bg-accent-hover text-white transition-all duration-200 cursor-pointer shadow-sm shadow-accent/20">
                                <i class="bi bi-plus-lg"></i>Añadir
                            </button>
                        </form>
                    </th:block>

                    <!-- Categoría no mapeada: botón deshabilitado -->
                    <th:block th:unless="${categoryKeyToId[item.categoryKey] != null}">
                        <button type="button" disabled
                                title="Crea primero la categoría correspondiente en la app"
                                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium bg-slate-700/50 text-slate-500 border border-white/[0.06] cursor-not-allowed">
                            <i class="bi bi-plus-lg"></i>Añadir
                        </button>
                    </th:block>
                </div>
            </div>
        </div>
    </div>

    <!-- Estado vacío: ningún resultado -->
    <div x-show="$el.previousElementSibling.querySelectorAll('[x-show]').length === 0"
         class="glass-card rounded-xl p-16 text-center mt-4" style="display:none"
         id="noResults">
        <i class="bi bi-search text-5xl text-slate-600 block mb-4"></i>
        <p class="text-slate-400 mb-4">No se encontraron servicios</p>
        <button @click="search = ''; cat = ''"
                class="px-4 py-2 border border-white/[0.1] text-slate-400 hover:text-slate-200 hover:border-white/20 rounded-lg text-sm transition-all duration-200 cursor-pointer">
            Limpiar filtros
        </button>
    </div>

</div>

<th:block layout:fragment="scripts">
<style>
    /* Evita flash de contenido sin filtrar antes de Alpine */
    [x-cloak] { display: none !important; }
    /* Limitar descripción a 2 líneas */
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>
</th:block>
</body>
</html>
